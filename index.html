<!DOCTYPE html>
<html>
<head>
    <title>Servidor Web</title>

    <style>

        body {
            background: #f8f4f4;
            font-family: Arial, Helvetica, sans-serif;
            text-align: center;
            margin-top: 100px;
        }

        .card {
            background: #ffffff;
            width: 550px;
            margin: auto;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0px 4px 12px rgba(0,0,0,0.15);
            border-top: 6px solid #c0392b;
        }

        h1 {
            color: #c0392b;
        }

        p {
            color: #555;
            font-size: 16px;
        }

        a {
            color: white;
            background: #c0392b;
            padding: 10px 18px;
            border-radius: 6px;
            text-decoration: none;
            font-weight: bold;
        }

        a:hover {
            background: #922b21;
        }

    </style>

</head>

<body>

<div class="card">

    <h1>Servidor Activo</h1>

    <p>El servidor Apache se encuentra funcionando correctamente</p>

    <br>

   <a href="/" target="_blank">

</html>
